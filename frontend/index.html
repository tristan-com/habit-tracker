<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker — Sign In</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-mark">◆</div>
      <h1>Streak</h1>
      <p class="brand-sub">Build habits that stick.</p>
    </div>

    <div class="auth-card">
      <div class="tab-row">
        <button class="tab active" id="tab-login" onclick="showTab('login')">Sign in</button>
        <button class="tab" id="tab-register" onclick="showTab('register')">Create account</button>
      </div>

      <!-- Login form -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <div id="login-error" class="form-error hidden"></div>
        <button type="submit" class="btn-primary" id="login-btn">Sign in</button>
      </form>

      <!-- Register form -->
      <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
        <div class="field">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="At least 8 characters" required minlength="8">
        </div>
        <div id="register-error" class="form-error hidden"></div>
        <div id="register-success" class="form-success hidden"></div>
        <button type="submit" class="btn-primary" id="register-btn">Create account</button>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script>

    // Redirect if already logged in
    if (localStorage.getItem("token")) {
      window.location.href = "dashboard.html";
    }

    function showTab(tab) {
      const isLogin = tab === "login";
      document.getElementById("login-form").classList.toggle("hidden", !isLogin);
      document.getElementById("register-form").classList.toggle("hidden", isLogin);
      document.getElementById("tab-login").classList.toggle("active", isLogin);
      document.getElementById("tab-register").classList.toggle("active", !isLogin);
      clearErrors();
    }

    function clearErrors() {
      ["login-error", "register-error", "register-success"].forEach(id => {
        const el = document.getElementById(id);
        el.classList.add("hidden");
        el.textContent = "";
      });
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.textContent = loading
        ? (btnId === "login-btn" ? "Signing in…" : "Creating account…")
        : (btnId === "login-btn" ? "Sign in" : "Create account");
    }

    async function handleLogin(e) {
      e.preventDefault();
      clearErrors();
      setLoading("login-btn", true);

      const email    = document.getElementById("login-email").value;
      const password = document.getElementById("login-password").value;

      try {
        // OAuth2 login expects form data, not JSON
        const body = new URLSearchParams({ username: email, password });
        const res  = await fetch(`${API}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body,
        });

        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.detail || "Incorrect email or password.");
        }

        const data = await res.json();
        localStorage.setItem("token", data.access_token);
        window.location.href = "dashboard.html";

      } catch (err) {
        const el = document.getElementById("login-error");
        el.textContent = err.message;
        el.classList.remove("hidden");
      } finally {
        setLoading("login-btn", false);
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      clearErrors();
      setLoading("register-btn", true);

      const email    = document.getElementById("reg-email").value;
      const password = document.getElementById("reg-password").value;

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.detail || "Registration failed.");
        }

        // Show success and switch to login
        const success = document.getElementById("register-success");
        success.textContent = "Account created! Sign in to continue.";
        success.classList.remove("hidden");
        setTimeout(() => showTab("login"), 1500);

      } catch (err) {
        const el = document.getElementById("register-error");
        el.textContent = err.message;
        el.classList.remove("hidden");
      } finally {
        setLoading("register-btn", false);
      }
    }
  </script>
</body>
</html>
